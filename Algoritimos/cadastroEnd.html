<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratify | Cadastro de Endereço</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.css">
</head>

<body>

    <div class="header">
        <div class="logo">
            <a href="index.html"><img src="img/logo.png" alt="" width="60px" height="auto"></a>
        </div>
        <div class="rotas">
            <a href="simulador.html">Simulador Financeiro</a>
            <a href="quemSomos.html">Quem Somos</a>
            <a href="produto.html">Nosso Produto</a>
            <a href="login.html">Login</a>
        </div>
    </div>

    <div class="cadastro">
        <div class="container">


            <div class="forms">

                <h3>Preencha seu endereço:</h3>

                <div class="input-group-pai">

                    <div class="input-group1">
                        <div class="input-group">
                            <img src="img/nome.png" alt="">
                            <input type="text" id="input_cep" placeholder="CEP:"><br><br>
                        </div>

                        <div class="input-group">
                            <img src="img/nome.png" alt="">
                            <input type="text" id="input_rua" placeholder="Rua/Avenida:"><br><br>
                        </div>
                    </div>

                    <div class="input-group2">
                        <div class="input-group">
                            <img src="img/nome.png" alt="">
                            <input type="text" id="input_bairro" placeholder="Bairro:"><br><br>
                        </div>

                        <div class="input-group">
                            <img src="img/nome.png" alt="">
                            <input type="text" id="input_num" placeholder="Número:"><br><br>
                        </div>

                    </div>

                </div>

                <div class="div-select">
                    <select id="perfil">
                        <option value="">Selecione a UF</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select>
                </div>

                <div class="proxima-pagina">
                    <button onclick="cadastro()">Cadastrar</button>
                </div>

                <div id="mensagem"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Stratify. Todos os direitos reservados a empresa Stratify.</p>
            <ul class="footer-links"></ul>
        </div>
    </footer>
</body>

</html>

<script>
    function cadastro() {
        let cep = input_cep.value;
        let rua = input_rua.value;
        let bairro = input_bairro.value;
        let num = input_num.value;
        let uf = perfil.value;

        let usuario = JSON.parse(localStorage.getItem("usuarioLogado"));

        if (cep == "" || rua == "" || bairro == "" || num == "" || uf == "") {
            mensagem.innerHTML = `<span style="color: red;">Preencha todos os campos!</span>`
        } else if (cep.length != 9) {
            mensagem.innerHTML = `<span style="color: red;">CEP inválido!</span>`
        } else {
            mensagem.innerHTML = `<span style="color: green;">Cadastro efetuado com sucesso!</span>`;
            localStorage.setItem("usuarioLogado", JSON.stringify(usuario));
            localStorage.setItem("usuarioLogado", JSON.stringify(usuario));
            setTimeout(function () {
                window.location = ".//login.html";
            }, 1000);
        }
    }

</script>
