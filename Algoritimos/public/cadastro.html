<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratify | Cadastro</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/header.css">
</head>

<body>

    <div class="header">
        <div class="logo">
            <a href="index.html"><img src="assets/img/logo.png" alt="" width="60px" height="auto"></a>
        </div>
        <div class="rotas">
            <a href="simulador.html">Simulador Financeiro</a>
            <a href="quemSomos.html">Quem Somos</a>
            <a href="produto.html">Nosso Produto</a>
            <a href="login.html">Login</a>
        </div>
    </div>

    <div class="cadastro">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="container">
            <div class="titulo">
                <h2>Conte conosco <br> para uma <br> experiência <br> incrível.</h2>
            </div>

            <div class="forms">

                <h3>Cadastre-se:</h3>

                <div class="input-group-pai">

                    <div class="input-group1">
                        <div class="input-group">
                            <img src="assets/img/nome.png" alt="">
                            <input type="text" id="input_social" placeholder="Razão social da empresa:"><br><br>
                        </div>

                        <div class="input-group">
                            <img src="assets/img/nome.png" alt="">
                            <input type="text" id="input_cnpj" placeholder="CNPJ:"><br><br>
                        </div>

                        <div class="input-group">
                            <img src="assets/img/nome.png" alt="">
                            <input type="text" id="input_nome" placeholder="Seu Nome:"><br><br>
                        </div>
                    </div>

                    <div class="input-group2">
                        <div class="input-group email">
                            <img src="assets/img/email.png" alt="">
                            <input type="text" id="input_email" placeholder="E-mail:"> <br><br>
                        </div>

                        <div class="input-group">
                            <img src="assets/img/segurança.png" alt="">
                            <input type="password" id="ipt_senha" placeholder="Senha:" oninput="Analisar()"><br><br>
                        </div>

                        <div class="input-group">
                            <img src="assets/img/segurança.png" alt="">
                            <input type="password" id="input_confirmar" placeholder="Confirmar Senha:"><br><br>
                        </div>


                    </div>

                </div>

                <div class="div-select">
                    <select id="perfil">
                        <option value="">Selecione o perfil</option>
                        <option value="representante">Representante</option>
                    </select>
                </div>

                <div class="proxima-pagina">
                    <button onclick="cadastro()">Continuar</button>
                </div>

                <div id="mensagem"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Stratify. Todos os direitos reservados a empresa Stratify.</p>
            <ul class="footer-links"></ul>
        </div>
    </footer>
</body>

</html>

<script>
    function Analisar() {
        let senha = ipt_senha.value;
        let tamanho = senha.length;
        let senhaMai = senha.toUpperCase();
        let senhaMin = senha.toLowerCase();
        let forca = 0;

        if (tamanho >= 8) {
            forca++;
        }
        if (senha != senhaMai) {
            forca++;
        }
        if (senha != senhaMin) {
            forca++;
        }

        if (forca == 3) {
            mensagem.innerHTML = `<span style="color: green;">Senha forte</span>`;
        } else if (forca == 2) {
            mensagem.innerHTML = `<span style="color: orange;">Senha média</span>`;
        } else if (forca == 1) {
            mensagem.innerHTML = `<span style="color: yellow;">Senha fraca</span>`;
        } else {
            mensagem.innerHTML = `<span style="color: red;">Senha inválida</span>`;
        }
    }

    function cadastro() {
        let empresa = input_social.value
        let cnpj = input_cnpj.value
        let nome = input_nome.value
        let email = input_email.value;
        let senha = ipt_senha.value;
        let confirmacao = input_confirmar.value
        let termina_com_sptech = email.endsWith('sptech.school');
        let tem_arroba = email.indexOf('@') != -1;
        let perfilUser = perfil.value;

        let campos = [
            input_social,
            input_cnpj,
            input_nome,
            input_email,
            ipt_senha,
            input_confirmar,
            perfil
        ]

        for (var i = 0; i < campos.length; i++) {
            if (campos[i].value == "") {
                mensagem.innerHTML = `<span style="color: red;">Preencha todos os campos!</span>`
                return false;
            }
        }

        if (empresa.length < 3) {
            mensagem.innerHTML = "Nome da empresa muito curto!";
            return;
        }

        if (cnpj.length != 14) {
            mensagem.innerHTML = `<span style="color: red;">CNPJ inválido!</span>`
            return;
        }

        let numeros = "0123456789";
        let temNumero = false;

        for (let i = 0; i < numeros.length; i++) {
            if (nome.includes(numeros[i])) {
                temNumero = true;
                break;
            }
        }

        if (temNumero) {
            mensagem.innerHTML = `<span style="color: red;">Nome inválido!</span>`;
            return;
        }

        if (!tem_arroba || !termina_com_sptech) {
            mensagem.innerHTML = `<span style="color: red;">E-mail inválido</span>`;
            return;
        }

        if (confirmacao != senha) {
            mensagem.innerHTML = `<span style="color: red;">Erro na confirmação da senha!</span>`
            return;
        }

        // Enviando o valor da nova input
        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js
                razao_socialServer: empresa,
                cnpj_empresaServer: cnpj,
                nome_representanteServer: nome,
                email_representanteServer: email,
                senha_representanteServer: senha
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    cardErro.style.display = "block";

                    resposta.json().then(dados => {

                        sessionStorage.ID_EMPRESA = dados.idEmpresa;

                        mensagem.innerHTML =
                            "Cadastro realizado com sucesso! Redirecionando...";

                        setTimeout(() => {
                            window.location = "./cadastroEnd.html";
                        }, 2000);
                    });

                    limparFormulario();
                    finalizarAguardar();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                finalizarAguardar();
            });

        return false;
    }



</script>
