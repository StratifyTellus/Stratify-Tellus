
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratify | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.css">
</head>

<body>

    <div class="header">
        <div class="logo">
            <a href="index.html"><img src="img/logo.png" alt="" width="60px" height="auto"></a>
        </div>
        <div class="rotas">
            <a href="cadastroUser.html">Cadastrar Funcionário</a>
            <a href="cadastro.html">Cadastro</a>
            <a href="login.html">Login</a>
        </div>
    </div>

    <div class="login">
        <div class="container">
            <div class="titulo">
                <h2>É um prazer <br> tê-lo(a) <br> conosco <br> novamente!</h2>
            </div>

            <div class="forms">

                <h3>Login:</h3>

                <div class="input-group email">
                    <img src="img/cpf.png" alt="">
                    <input type="text" id="input_cod" placeholder="Código da empresa:"> <br><br>
                </div>

                <div class="input-group email">
                    <img src="img/email.png" alt="">
                    <input type="text" id="input_email" placeholder="E-mail:"> <br><br>
                </div>

                <div class="input-group">
                    <img src="img/segurança.png" alt="">
                    <input type="password" id="ipt_senha" placeholder="Senha:"><br><br>
                </div>

                <div class="input-group botao">
                    <img src="img/entrar.png" alt="">
                    <button onclick="login()">Entrar</button>
                </div>

                <div id="mensagem"></div>
            </div>
        </div>
    </div>

      <footer>
            <div class="footer-content">
                <p>&copy; 2026 Stratify. Todos os direitos reservados a empresa Stratify.</p>
                <ul class="footer-links">
                    <a href="#">Política de Privacidade</a>
                    <a href="#">Contato</a>
                </ul>
            </div>
        </footer>
</body>

</html>

<script>
    function login() {
        let codEmpresa = input_cod.value
        let email = input_email.value;
        let senha = ipt_senha.value;

        let usuarioSalvo = localStorage.getItem(email);

        if (usuarioSalvo == null) {
            alert("Usuário não encontrado");
            return;
        }

        let usuario = JSON.parse(usuarioSalvo);

        if (usuario.senha != senha) {
            alert("Senha incorreta");
            return;
        }

        if (codEmpresa != '1234') {
            mensagem.innerHTML = `<span style="color: red;">Código da empresa inválido!</span>`
        } else {
            mensagem.innerHTML = `<span style="color: green;">Login efetuado com sucesso!</span>`
            localStorage.setItem("usuarioLogado", JSON.stringify(usuario));
            setTimeout(function () {
                window.location = ".//dashboard.html";
            }, 1000); // apenas para exibir o loading
        }

    }
</script>
