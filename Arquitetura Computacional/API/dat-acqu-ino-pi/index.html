<!doctype html>
<html>

<head>
    <title>Graphics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="margin: auto; display: flex; align-items: center; flex-direction: column; justify-content: center; background-color: antiquewhite; height: 100%;">

    <h1>Gráfico de Monitoramento do Sensor 1 </h1>
    <div style="display: flex; width: 100%; justify-content: center; align-items: center; height: 50%; flex-direction: column;" >
        <div style="width: 50%; background-color: aliceblue; border-radius: 10px; border: solid 2px #000;">
        <canvas id="umidade"></canvas>
        </div>
        <!----div style="width: 50%;"--->
            <!----canvas id="sensorDigital"></canvas>-->
        <!--/div -->
    </div>

    <script>
        var umidade = new Chart(document.getElementById('umidade').getContext('2d'), {
                        type: 'line',
            data: {
                datasets: [{
                    label: 'Umidade',
                    borderColor: '#497ec9',
                    backgroundColor: '#275391'
                }]
            },
            options: {
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Segundo'
                        },
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(%)'
                        },
                        beginAtZero: true,
                    },
                },
            }
        });


        

        var paginacao = {};
        var tempo = {};

        function obterDados(grafico, endpoint) {
            fetch('http://localhost:3300/sensores/' + endpoint)
                .then(response => response.json())
                .then(valores => {
                    if (paginacao[endpoint] == null) {
                        paginacao[endpoint] = 0;
                    }
                    if (tempo[endpoint] == null) {
                        tempo[endpoint] = 0;
                    }

                    var ultimaPaginacao = paginacao[endpoint];
                    paginacao[endpoint] = valores.length;
                    valores = valores.slice(ultimaPaginacao);

                    valores.forEach((valor) => {
                        if (grafico.data.labels.length == 10 && grafico.data.datasets[0].data.length == 10) {
                            grafico.data.labels.shift();
                            grafico.data.datasets[0].data.shift();
                        }

                        grafico.data.labels.push(tempo[endpoint]++);
                        grafico.data.datasets[0].data.push(parseFloat(valor));
                        grafico.update();
                    });
                })
                .catch(error => console.error('Erro ao obter dados:', error));
        }

        setInterval(() => {
            obterDados(umidade, 'analogico');
        }, 1000);

    </script>
</body>

</html>
